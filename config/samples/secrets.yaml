---
# API key secret for cloud model providers (Anthropic, OpenAI, etc.)
# Replace the base64-encoded value with your actual API key:
#   echo -n 'sk-ant-...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: kbrain-system
type: Opaque
data:
  api-key: <BASE64_ENCODED_API_KEY>
---
# Git credentials secret for cloning repos and pushing branches
# Replace the base64-encoded values with your actual token:
#   echo -n 'ghp_...' | base64
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: kbrain-system
type: Opaque
data:
  token: <BASE64_ENCODED_GIT_TOKEN>
  username: <BASE64_ENCODED_USERNAME>
